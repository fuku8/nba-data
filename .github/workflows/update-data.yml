name: Update NBA Data

on:
  schedule:
    - cron: '22 12 * * *'  # UTC 12:22 (JST 21:22)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4 lxml

      - name: Fetch data from Basketball Reference
        run: python scripts/fetch-bref-data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update NBA data $(date -u +%Y-%m-%d)"
          git push
