name: Update NBA Data

on:
  schedule:
    - cron: '0 12 * * *'  # UTC 12:00 (JST 21:00 / EDT 8:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests nba_api

      - name: Fetch data from NBA.com
        run: python scripts/fetch-nba-data.py

      - name: Check for changes
        id: changes
        run: |
          git add data/
          git diff --cached --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update NBA data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
